<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="weather-card">
    <div class="search-container">
      <input type="text" id="city-input" placeholder="Enter city name...">
      <button id="search-btn">
        <svg xmlns="[w3.org](http://www.w3.org/2000/svg)" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
      </button>
    </div>
    
    <div class="weather-info">
      <div class="weather-icon">
        <svg xmlns="[w3.org](http://www.w3.org/2000/svg)" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>
      </div>
      
      <div class="temperature">
        <span id="temp">24</span>
        <span class="degree">°C</span>
      </div>
      
      <h2 id="city-name">San Francisco</h2>
      
      <p class="condition">Sunny</p>
      
      <div class="details">
        <div class="detail-item">
          <span class="label">Humidity</span>
          <span class="value">62%</span>
        </div>
        <div class="detail-item">
          <span class="label">Wind</span>
          <span class="value">12 km/h</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
