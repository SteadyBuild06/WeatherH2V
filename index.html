<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doraemon Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: #e8f4fd;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ─── SCENE ─────────────────────────────────────────── */
.scene {
  width: 100%;
  height: 100vh;
  position: relative;
  background: linear-gradient(175deg, #c9e9ff 0%, #ddf1ff 45%, #eef8ff 80%, #f5fbff 100%);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── WATERMARK ─────────────────────────────────────── */
.watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  pointer-events: none;
  white-space: nowrap;
  user-select: none;
}
.wm-line1 {
  font-size: clamp(60px, 12vw, 110px);
  font-weight: 900;
  color: rgba(0, 100, 200, 0.055);
  letter-spacing: -3px;
  line-height: 1;
}
.wm-line2 {
  font-size: clamp(44px, 9vw, 80px);
  font-weight: 900;
  color: rgba(200, 40, 40, 0.065);
  letter-spacing: -2px;
  text-align: right;
}

/* ─── SUN ────────────────────────────────────────────── */
.sun {
  position: absolute;
  top: 40px;
  right: 80px;
  width: 72px;
  height: 72px;
  background: radial-gradient(circle, #fff9c4 30%, #ffe066 60%, #ffd000 100%);
  border-radius: 50%;
  box-shadow:
    0 0 0 14px rgba(255, 224, 102, 0.22),
    0 0 0 28px rgba(255, 224, 102, 0.10);
  animation: sunPulse 5s ease-in-out infinite;
  z-index: 2;
}
@keyframes sunPulse {
  0%, 100% { box-shadow: 0 0 0 14px rgba(255,224,102,.22), 0 0 0 28px rgba(255,224,102,.10); }
  50%       { box-shadow: 0 0 0 22px rgba(255,224,102,.28), 0 0 0 42px rgba(255,224,102,.12); }
}

/* ─── CLOUDS ─────────────────────────────────────────── */
.cloud-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
}
.cloud { position: absolute; }
.cloud svg { opacity: 0.78; }

.cl1 { animation: driftCloud 30s linear infinite; top: 38px; }
.cl2 { animation: driftCloud 42s linear infinite; top: 95px;  animation-delay: -16s; }
.cl3 { animation: driftCloud 24s linear infinite; top: 20px;  animation-delay: -9s; }
.cl4 { animation: driftCloud 50s linear infinite; top: 130px; animation-delay: -22s; }
.cl5 { animation: driftCloud 36s linear infinite; top: 60px;  animation-delay: -5s; }

@keyframes driftCloud {
  from { transform: translateX(-340px); }
  to   { transform: translateX(110vw); }
}

/* ─── FLOATING BELLS ─────────────────────────────────── */
.bell {
  position: absolute;
  pointer-events: none;
  z-index: 3;
  animation: bellFloat ease-in-out infinite;
}
.bell svg { filter: drop-shadow(0 5px 10px rgba(160, 110, 0, 0.30)); }

@keyframes bellFloat {
  0%, 100% { transform: translateY(0)   rotate(-9deg); }
  50%       { transform: translateY(-20px) rotate(9deg); }
}

/* ─── WALKING DORAEMON ───────────────────────────────── */
#doraWalk {
  position: absolute;
  bottom: 18px;
  pointer-events: none;
  z-index: 6;
}
.dora-walk-anim {
  animation: walkPath 16s linear infinite;
}
@keyframes walkPath {
  0%  { left: -160px; transform: scaleX(1); }
  44% { left: 82%;    transform: scaleX(1); }
  45% { left: 82%;    transform: scaleX(-1); }
  90% { left: -5%;    transform: scaleX(-1); }
  91% { left: -5%;    transform: scaleX(1); }
  100%{ left: -160px; transform: scaleX(1); }
}
#doraLegWrap {
  /* GSAP handles the bob */
}

/* ─── WEATHER CARD ───────────────────────────────────── */
.weather-card {
  position: relative;
  z-index: 10;
  width: min(360px, 92vw);
  background: rgba(255, 255, 255, 0.52);
  backdrop-filter: blur(36px) saturate(210%);
  -webkit-backdrop-filter: blur(36px) saturate(210%);
  border-radius: 40px;
  border: 2.5px solid rgba(255, 255, 255, 0.78);
  box-shadow:
    0 28px 64px rgba(0, 100, 200, 0.20),
    0 2px 0 rgba(255, 255, 255, 0.95) inset,
    0 -1px 0 rgba(0, 100, 200, 0.08) inset;
  padding: 26px 26px 22px;
  animation: cardReveal 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(30px) scale(0.90); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* Shine overlay */
.weather-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 40px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.32) 0%,
    transparent 45%,
    rgba(255,255,255,0.07) 100%
  );
  pointer-events: none;
}

/* Red collar stripe */
.card-collar {
  position: absolute;
  top: -2px;
  left: 20%;
  right: 20%;
  height: 5px;
  background: linear-gradient(90deg, #b91c1c, #ef4444, #b91c1c);
  border-radius: 0 0 6px 6px;
  box-shadow: 0 3px 12px rgba(185, 28, 28, 0.55);
}

/* Swinging bell on card */
.card-bell {
  position: absolute;
  bottom: -22px;
  left: 50%;
  transform: translateX(-50%);
  transform-origin: 50% 0;
  animation: bellSwing 2.6s ease-in-out infinite;
}
@keyframes bellSwing {
  0%, 100% { transform: translateX(-50%) rotate(-13deg); }
  50%       { transform: translateX(-50%) rotate(13deg); }
}

/* ─── SEARCH BAR ─────────────────────────────────────── */
.search-wrap { display: flex; gap: 9px; margin-bottom: 18px; }

.city-in {
  flex: 1;
  padding: 11px 17px;
  background: rgba(255, 255, 255, 0.72);
  border: 2px solid rgba(255, 255, 255, 0.92);
  border-radius: 50px;
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  color: #00297a;
  outline: none;
  transition: all 0.2s;
}
.city-in::placeholder { color: rgba(0, 80, 160, 0.36); }
.city-in:focus {
  background: rgba(255, 255, 255, 0.96);
  border-color: #0077c8;
  box-shadow: 0 0 0 3px rgba(0, 119, 200, 0.22);
}

.srch-btn {
  padding: 11px 15px;
  background: linear-gradient(135deg, #b91c1c, #ef4444);
  border: 2px solid rgba(255, 255, 255, 0.50);
  border-radius: 50px;
  color: #fff;
  cursor: pointer;
  font-size: 17px;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  box-shadow: 0 4px 14px rgba(185, 28, 28, 0.38), inset 0 1px 0 rgba(255,255,255,0.28);
  transition: transform 0.15s, box-shadow 0.15s;
}
.srch-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(185, 28, 28, 0.48);
}
.srch-btn:active { transform: scale(0.94); }

/* ─── INFO SECTION ───────────────────────────────────── */
.info-wrap { text-align: center; }

#gadget-pill {
  display: inline-block;
  background: rgba(185, 28, 28, 0.10);
  border: 1.5px solid rgba(185, 28, 28, 0.28);
  border-radius: 20px;
  padding: 3px 13px;
  font-size: 11px;
  font-weight: 800;
  color: #991b1b;
  letter-spacing: 0.3px;
  margin-bottom: 10px;
}

/* Mini Doraemon in card */
#doraCard {
  margin-bottom: 4px;
  display: inline-block;
}
.dora-pop {
  animation: doraPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes doraPop {
  from { opacity: 0; transform: scale(0.2) rotate(-22deg); }
  to   { opacity: 1; transform: scale(1)   rotate(0deg); }
}

.w-icon {
  font-size: 46px;
  line-height: 1;
  margin-bottom: 6px;
  display: block;
  animation: iconBob 3.6s ease-in-out infinite;
}
@keyframes iconBob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-7px); }
}

.temp-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
#temp-num {
  font-size: 70px;
  font-weight: 900;
  color: #00297a;
  line-height: 1;
  letter-spacing: -3px;
}
.deg {
  font-size: 27px;
  font-weight: 700;
  color: rgba(0, 41, 122, 0.44);
  margin-top: 9px;
}

#city-lbl {
  font-size: 19px;
  font-weight: 800;
  color: #0055aa;
  margin-bottom: 2px;
}
#city-desc {
  font-size: 12px;
  font-weight: 600;
  color: rgba(0, 41, 122, 0.44);
  text-transform: capitalize;
  margin-bottom: 16px;
}

/* ─── DETAIL STATS ───────────────────────────────────── */
.details-row {
  display: flex;
  border-top: 2px solid rgba(0, 100, 200, 0.13);
  padding-top: 14px;
}
.det {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 9px 4px;
  border-radius: 18px;
  transition: background 0.2s;
  cursor: default;
}
.det:hover { background: rgba(255, 255, 255, 0.58); }
.det-lbl {
  font-size: 10px;
  font-weight: 800;
  color: rgba(0, 41, 122, 0.38);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.det-val {
  font-size: 15px;
  font-weight: 800;
  color: #004aaa;
}
</style>
</head>

          <ellipse cx="23" cy="62" rx="9" ry="5.5" fill="#0099e6" transform="rotate(-22 23 62)"/>
          <circle  cx="16" cy="66" r="6.5" fill="white"/>
          <ellipse cx="57" cy="62" rx="9" ry="5.5" fill="#0099e6" transform="rotate(22 57 62)"/>
          <circle  cx="64" cy="66" r="6.5" fill="white"/>
          <ellipse cx="40" cy="66" rx="18" ry="14" fill="#0099e6"/>
          <ellipse cx="40" cy="69" rx="13" ry="11" fill="white"/>
          <ellipse cx="30" cy="78" rx="12" ry="10" fill="#0099e6"/>
          <ellipse cx="50" cy="78" rx="12" ry="10" fill="#0099e6"/>
          <ellipse cx="30" cy="84" rx="14" ry="6.5" fill="white"/>

      </div>

      <!-- Weather emoji -->
      <span class="w-icon" id="wIcon">&#9925;&#65039;</span>

      <!-- Temperature -->
      <div class="temp-row">
        <span id="temp-num">26</span><span class="deg">°C</span>

      <div id="city-lbl">Tokyo, Japan</div>
      <div id="city-desc">Partly sunny skies</div>

      <!-- Details -->
      <div class="details-row">
        <div class="det">
          <span class="det-lbl">Humidity</span>
          <span class="det-val" id="dHum">62%</span>
        </div>
        <div class="det">
          <span class="det-lbl">Wind</span>
          <span class="det-val" id="dWind">18 km/h</span>
        </div>
        <div class="det">
          <span class="det-lbl">UV</span>
          <span class="det-val" id="dUV">5</span>

      </div>
    </div><!-- /info-wrap -->
  </div><!-- /weather-card -->

</div><!-- /scene -->

<script>
/* ── City database ─────────────────────────────────────── */
const db = {
  'tokyo':     {t:26, d:'Partly sunny skies',     e:'⛅', h:'62%', w:'18 km/h', uv:5,  l:'Tokyo, Japan',       g:'🚪 Anywhere Door — Tokyo!'},
  'delhi':     {t:38, d:'Hot and hazy',            e:'☀️', h:'45%', w:'12 km/h', uv:9,  l:'Delhi, India',        g:'🌡️ Heat Ray activated!'},
  'london':    {t:15, d:'Cloudy with drizzle',     e:'🌦', h:'80%', w:'22 km/h', uv:2,  l:'London, UK',          g:'☂️ Rain Hat deployed!'},
  'new york':  {t:22, d:'Clear and breezy',        e:'🌤', h:'55%', w:'28 km/h', uv:6,  l:'New York, USA',       g:'✈️ Take-Copter engaged!'},
  'paris':     {t:18, d:'Light rain showers',      e:'🌧', h:'72%', w:'14 km/h', uv:3,  l:'Paris, France',       g:'💡 Small Light — Paris!'},
  'sydney':    {t:20, d:'Mostly sunny',            e:'☀️', h:'50%', w:'16 km/h', uv:7,  l:'Sydney, Australia',   g:'🐾 Animal Hat activated!'},
  'dubai':     {t:42, d:'Scorching hot',           e:'🌞', h:'30%', w:'8 km/h',  uv:11, l:'Dubai, UAE',          g:'❄️ Ice Gun — cooling down!'},
  'singapore': {t:31, d:'Afternoon thunderstorms', e:'⛈', h:'85%', w:'10 km/h', uv:8,  l:'Singapore',           g:'🔦 Flashlight lit up!'},
  'mumbai':    {t:33, d:'Humid and hazy',          e:'🌫', h:'78%', w:'15 km/h', uv:7,  l:'Mumbai, India',       g:'🎵 Song Song Cider — Mumbai!'},
  'toronto':   {t:12, d:'Partly cloudy',           e:'🌤', h:'60%', w:'25 km/h', uv:4,  l:'Toronto, Canada',     g:'🌀 Translation Konjac ready!'},
  'moscow':    {t:4,  d:'Overcast and cold',       e:'🌫', h:'88%', w:'20 km/h', uv:1,  l:'Moscow, Russia',      g:'🧥 Warm Suit deployed!'},
  'beijing':   {t:19, d:'Hazy sunshine',           e:'🌤', h:'52%', w:'11 km/h', uv:5,  l:'Beijing, China',      g:'📜 Map activated — Beijing!'},
  'bangkok':   {t:35, d:'Tropical and humid',      e:'🌤', h:'82%', w:'9 km/h',  uv:9,  l:'Bangkok, Thailand',   g:'🌺 Flower Garden tool!'},
  'cairo':     {t:36, d:'Hot desert winds',        e:'🌵', h:'22%', w:'18 km/h', uv:10, l:'Cairo, Egypt',        g:'⏳ Time cloth — Cairo!'},
};

function doSearch() {
  const key  = document.getElementById('cityIn').value.trim().toLowerCase();
  const data = db[key] || {
    t:  Math.round(10 + Math.random() * 28),
    d:  'Variable conditions',
    e:  '🌤',
    h:  Math.round(40 + Math.random() * 45) + '%',
    w:  Math.round(8  + Math.random() * 22) + ' km/h',
    uv: Math.round(1  + Math.random() * 8),
    l:  document.getElementById('cityIn').value.trim() || 'Unknown City',
    g:  '🚪 Anywhere Door activated!'
  };

  document.getElementById('gadget-pill').textContent = data.g;
  document.getElementById('wIcon').textContent        = data.e;
  document.getElementById('temp-num').textContent     = data.t;
  document.getElementById('city-lbl').textContent     = data.l;
  document.getElementById('city-desc').textContent    = data.d;
  document.getElementById('dHum').textContent         = data.h;
  document.getElementById('dWind').textContent        = data.w;
  document.getElementById('dUV').textContent          = data.uv;

  /* Re-trigger Doraemon pop */
  const dc = document.getElementById('doraCard');
  dc.classList.remove('dora-pop');
  void dc.offsetWidth;
  dc.classList.add('dora-pop');

  /* Card spring */
  gsap.fromTo('#wCard',
    { scale: 0.94, opacity: 0.72 },
    { scale: 1,    opacity: 1, duration: 0.55, ease: 'back.out(2.2)' }
  );
  /* Temp slide-in */
  gsap.fromTo('#temp-num',
    { y: 12, opacity: 0 },
    { y: 0,  opacity: 1, duration: 0.4, delay: 0.08, ease: 'power3.out' }
  );
}

/* ── GSAP: Doraemon walking bob ─────────────────────── */
gsap.to('#doraLegWrap', {
  y: -7,
  duration: 0.42,
  ease: 'sine.inOut',
  yoyo: true,
  repeat: -1
});

/* ── GSAP: Bell sway (background bells) ─────────────── */
gsap.to('.bell', {
  rotation: 11,
  duration: 1.3,
  ease: 'sine.inOut',
  yoyo: true,
  repeat: -1,
  stagger: 0.45,
  transformOrigin: '50% 0%'
});
</script>
